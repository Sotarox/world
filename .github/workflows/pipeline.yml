name: Java CI with Maven

on:
  push:
    branches: [ "main", "dev", "feature/**" ]
  pull_request:
    branches: [ "main", "dev", "feature/**" ]

env:
  DOCKER_IMAGE_NAME: world-app
  DOCKER_REGISTRY_URL: myregistry.domain.com

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B compile --file ./pom.xml
    - name: Run tests
      run: mvn -B test --file ./pom.xml
    
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v6
    - name: Set up Node.js 24
      uses: actions/setup-node@v6
      with:
        node-version: 24
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Run unit tests
      run: npm run test:unit
    - name: Build frontend
      run: npm run build
    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps
    # Currently E2E test is only run on Chromium to speed up the test execution.
    # Also E2E test targets only frontend. In the future, testing along with backend is considerable.
    - name: Run E2E tests
      run: npx playwright test --project=chromium

  docker-push:
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/feature/add-docker-push'
    runs-on: ubuntu-latest
    steps:
    - name: Check out the repository
      uses: actions/checkout@v6
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build the hello-docker Docker image
    run: |
       docker build . --tag ghcr.io/sotarox/world-app:latest
       docker push ghcr.io/sotarox/world-app:latest

